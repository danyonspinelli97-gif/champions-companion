<svg xmlns="http://www.w3.org/2000/svg" viewBox="86 44 340 340" role="img" aria-label="Champions Companion logo">
  <defs>
    <linearGradient id="leaf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#54c878"/>
      <stop offset="1" stop-color="#1d6a38"/>
    </linearGradient>
    <linearGradient id="leafMid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4fd6c2"/>
      <stop offset="1" stop-color="#2a8f76"/>
    </linearGradient>
    <linearGradient id="crystal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8fe7f6"/>
      <stop offset="0.5" stop-color="#39a9e8"/>
      <stop offset="1" stop-color="#2f6fd2"/>
    </linearGradient>
  </defs>

  <g stroke="#0a1020" stroke-width="11" stroke-linejoin="round" stroke-linecap="round">
    <!-- side leaves -->
    <path d="M256 338 C 168 330 116 256 128 168 C 214 184 252 256 256 338 Z" fill="url(#leaf)"/>
    <path d="M256 338 C 344 330 396 256 384 168 C 298 184 260 256 256 338 Z" fill="url(#leaf)"/>
    <!-- center frond -->
    <path d="M256 340 C 238 236 248 150 256 104 C 264 150 274 236 256 340 Z" fill="url(#leafMid)"/>
    <!-- crystal -->
    <path d="M256 150 L 324 250 L 256 360 L 188 250 Z" fill="url(#crystal)"/>
  </g>

  <!-- crystal facets + highlight (no outline) -->
  <g stroke="#cdeffb" stroke-width="5" opacity="0.9" fill="none" stroke-linecap="round">
    <path d="M256 150 L 256 360 M 188 250 L 324 250"/>
  </g>
  <path d="M256 196 L 292 250 L 256 304 L 220 250 Z" fill="#e6f8ff" opacity="0.55"/>

  <!-- top sparkle -->
  <path d="M256 60 L 270 96 L 306 110 L 270 124 L 256 160 L 242 124 L 206 110 L 242 96 Z"
        fill="#bfeefc" stroke="#0a1020" stroke-width="7" stroke-linejoin="round"/>
</svg>
